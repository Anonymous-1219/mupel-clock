name: Mobile Cloud Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    # 1. First, we create the wrapper configurations
    - name: Generate Safe Gradle Wrapper Configuration
      run: gradle wrapper --gradle-version 8.10.2

    # 2. Give the file executing rights
    - name: Grant Gradle Permissions
      run: chmod +x gradlew

    # 👇 3. THIS RUNS THE DOWNGRADE ENGINE SO VERSION 9 NEVER TOUCHES YOUR APP
    - name: Download and Apply Gradle 8.10.2
      run: ./gradlew wrapper --gradle-version 8.10.2

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Save APK Asset
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: app/build/outputs/apk/debug/app-debug.apk
