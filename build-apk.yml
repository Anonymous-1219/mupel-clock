name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Upload APK to Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: Mupel-Clock-APK
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30

    - name: Create GitHub Release
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/release/app-release-unsigned.apk
        tag_name: build-${{ github.run_number }}
        name: Mupel Clock Build #${{ github.run_number }}
        body: |
          ✅ **Mupel Clock APK Built Successfully!**
          
          Build #${{ github.run_number }}
          Commit: ${{ github.sha }}
          
          **Features:**
          - 🕐 Digital Clock with 12/24 format
          - ⏱️ Timer with floating overlay widget
          - ⏱️ Stopwatch with lap tracking
          - 🎯 Background service support
          - 📱 AMOLED dark theme with Mupel purple
          
          **Download & Install:**
          1. Download `app-release-unsigned.apk`
          2. Transfer to your Android device
          3. Open file manager → tap APK → Install
          4. Grant permissions when prompted
          5. Open Mupel Clock and enjoy!
          
          **System Requirements:**
          - Android 8.0+ (API 26)
          - 50MB free storage
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
