name: Mobile Cloud Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    # 👇 THIS STEP FORCES A COMPATIBLE GRADLE VERSION INSTEAD OF VERSION 9
    - name: Generate Safe Gradle Wrapper
      run: gradle wrapper --gradle-version 8.10.2

    - name: Grant Gradle Permissions
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Save APK Asset
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: app/build/outputs/apk/debug/app-debug.apk
